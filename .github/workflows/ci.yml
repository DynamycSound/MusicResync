name: Build APK

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build-debug:
    name: Build debug APK
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: ./app/build/outputs/apk/debug/app-debug.apk

  build-release:
    if: github.event_name == 'push'
    name: Build signed release APK
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # MusicResync is sideloaded (not a Play Store app), so the release APK only needs *a* signature to be
      # installable. We mint a throwaway keystore here, which keeps CI green with zero secrets. The canonical
      # release the maintainer distributes is built locally with the stable keystore (see project notes); if you
      # ever want CI to produce in-place-upgradeable APKs, swap this step for a keystore decoded from a secret.
      - name: Generate signing key
        run: |
          keytool -genkeypair -v -keystore release.keystore \
            -alias musicresync -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass musicresync -keypass musicresync \
            -dname "CN=MusicResync, OU=DynamycSound, O=DynamycSound, C=US"
          {
            echo "RELEASE_STORE_FILE=$(realpath release.keystore)"
            echo "RELEASE_STORE_PASSWORD=musicresync"
            echo "RELEASE_KEY_ALIAS=musicresync"
            echo "RELEASE_KEY_PASSWORD=musicresync"
          } >> "$GITHUB_ENV"

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: ./app/build/outputs/apk/release/app-release.apk
