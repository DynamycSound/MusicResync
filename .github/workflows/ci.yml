name: Build APK

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build-debug:
    name: Build debug APK
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: ./app/build/outputs/apk/debug/app-debug.apk

  build-release:
    if: github.event_name == 'push'
    name: Build & publish signed release APK
    runs-on: ubuntu-latest

    # contents: write lets this job create/update the GitHub Release (using the auto-provided GITHUB_TOKEN).
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # Signs with the disposable, repo-committed keystore (release-keystore.jks) so every release shares one
      # signature and installs as an in-place upgrade — no secrets, no manual steps. This is NOT the Play Store
      # key (that's separate and Google-managed); rotate this key freely if ever needed.
      - name: Build release APK
        env:
          RELEASE_STORE_FILE: ${{ github.workspace }}/release-keystore.jks
          RELEASE_STORE_PASSWORD: MusicResync2026!
          RELEASE_KEY_ALIAS: musicresync
          RELEASE_KEY_PASSWORD: MusicResync2026!
        run: ./gradlew assembleRelease

      - name: Upload release APK (build artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: ./app/build/outputs/apk/release/app-release.apk

      # Auto-publish a GitHub Release for the current versionName. New version -> a fresh release is created;
      # same version pushed again -> the APK on the existing release is refreshed. Fully automatic: bump
      # versionName in app/build.gradle.kts, push, and the release appears with the signed APK attached.
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep -E 'versionName *=' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "versionName = $VERSION"
          cp app/build/outputs/apk/release/app-release.apk "MusicResync-v$VERSION.apk"

          # Prefer the hand-written RELEASE_NOTES.md when present, otherwise fall back to auto-generated notes.
          NOTES_ARGS=(--generate-notes)
          if [ -f RELEASE_NOTES.md ]; then
            NOTES_ARGS=(--notes-file RELEASE_NOTES.md)
          fi

          if gh release view "v$VERSION" >/dev/null 2>&1; then
            # Refresh both the APK and the notes so re-pushing the same version updates the existing release.
            gh release upload "v$VERSION" "MusicResync-v$VERSION.apk" --clobber
            if [ -f RELEASE_NOTES.md ]; then
              gh release edit "v$VERSION" --notes-file RELEASE_NOTES.md
            fi
          else
            gh release create "v$VERSION" "MusicResync-v$VERSION.apk" \
              --title "MusicResync v$VERSION" \
              --target "$GITHUB_SHA" \
              "${NOTES_ARGS[@]}"
          fi
